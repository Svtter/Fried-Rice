{{- $publisherID := site.Params.adsense.publisher_id -}}
{{- $adSlot := site.Params.adsense.ad_slot_404 -}}
{{- $format := site.Params.adsense.ad_format | default "auto" -}}
{{- $responsive := site.Params.adsense.ad_responsive | default true -}}
<div class="not-found-ad" data-adsense-placeholder="true"
     data-ad-client="{{ $publisherID }}"
     data-ad-slot="{{ $adSlot }}"
     data-ad-format="{{ $format }}"
     {{ if $responsive }}data-full-width-responsive="true"{{ end }}>
</div>
